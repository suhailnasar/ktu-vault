<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>KTU Vault</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <nav class="top-nav">
    <div class="nav-logo">KTU Vault</div>
    <div class="nav-right">
      <div class="nav-chip" id="filter-chip" style="display:none;cursor:pointer" onclick="clearFilter()"></div>
    </div>
  </nav>

  <div class="search-wrap">
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Search notes, QPs, topics...">
    </div>
  </div>

  <div class="pills-wrap" id="pills">
    <div class="pill active" data-cat="all">All</div>
    <div class="pill inactive" data-cat="notes">Notes</div>
    <div class="pill inactive" data-cat="qp">Question Papers</div>
    <div class="pill inactive" data-cat="model_qp">Model QP</div>
    <div class="pill inactive" data-cat="syllabus">Syllabus</div>
  </div>

  <div id="continue-section" style="display:none">
    <div class="section-header">
      <div class="section-title">Continue Reading</div>
    </div>
    <div class="res-list" id="continue-list"></div>
  </div>

  <div class="section-header" style="padding-top:8px">
    <div class="section-title" id="section-label">All Resources</div>
  </div>
  <div class="res-list" id="resource-list">
    <div class="empty">
      <div class="empty-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <p>Loading resources...</p>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="bnav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="library.html" class="bnav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Library</span>
    </a>
    <a href="ai.html" class="bnav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>AI</span>
    </a>
    <a href="browse.html" class="bnav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Browse</span>
    </a>
  </nav>

  <script src="js/api.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
