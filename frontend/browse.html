<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Browse — KTU Vault</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<nav class="top-nav">
    <div class="nav-logo">Browse</div>
    <div class="nav-right">
        <div class="nav-chip" id="browse-filter-chip" style="display:none;cursor:pointer" onclick="clearBrowseFilter()">Clear ✕</div>
    </div>
</nav>
  <div style="padding: 16px 0 80px">

    <!-- Semester -->
    <div class="browse-section">
      <div class="browse-section-title">Semester</div>
      <div class="sem-grid" id="sem-grid">
        <div class="sem-btn" data-sem="1">S1</div>
        <div class="sem-btn" data-sem="2">S2</div>
        <div class="sem-btn" data-sem="3">S3</div>
        <div class="sem-btn" data-sem="4">S4</div>
        <div class="sem-btn" data-sem="5">S5</div>
        <div class="sem-btn" data-sem="6">S6</div>
        <div class="sem-btn" data-sem="7">S7</div>
        <div class="sem-btn" data-sem="8">S8</div>
      </div>
    </div>

    <!-- Branch -->
    <div class="browse-section">
      <div class="browse-section-title">B.Tech</div>
      <div class="branch-grid" id="branch-grid">
        <div class="branch-btn" data-branch="CSE">CSE</div>
        <div class="branch-btn" data-branch="CSD">CSD</div>
        <div class="branch-btn" data-branch="IT">IT</div>
        <div class="branch-btn" data-branch="ECE">ECE</div>
        <div class="branch-btn" data-branch="EEE">EEE</div>
        <div class="branch-btn" data-branch="EIE">EIE</div>
        <div class="branch-btn" data-branch="ME">ME</div>
        <div class="branch-btn" data-branch="CE">CE</div>
        <div class="branch-btn" data-branch="AI-ML">AI-ML</div>
        <div class="branch-btn" data-branch="AI-DS">AI-DS</div>
        <div class="branch-btn" data-branch="CSE(DS)">CSE(DS)</div>
        <div class="branch-btn" data-branch="CSE(AI)">CSE(AI)</div>
        <div class="branch-btn" data-branch="CSE(Cyber)">CSE(Cyber)</div>
      </div>
    </div>

    <!-- Subjects -->
    <div class="browse-section">
      <div class="browse-section-title">Subjects</div>
      <div class="subject-list" id="subject-list">
        <div class="empty"><p>Select semester and branch</p></div>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="bnav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="library.html" class="bnav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <span>Library</span>
    </a>
    <a href="ai.html" class="bnav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>AI</span>
    </a>
    <a href="browse.html" class="bnav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span>Browse</span>
    </a>
  </nav>

  <script src="js/api.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
