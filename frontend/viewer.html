<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Viewer — KTU Vault</title>
  <link rel="stylesheet" href="css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="padding-bottom:80px">

  <!-- Header -->
  <div class="viewer-header">
    <button class="back-btn" onclick="history.back()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="viewer-title" id="viewer-title">Loading...</div>
    <div style="display:flex;gap:8px">
      <a id="download-btn" class="nav-icon-btn" download>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </a>
      <button class="nav-icon-btn" id="ai-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      </button>
    </div>
  </div>

  <!-- PDF iframe -->
  <iframe
    id="pdf-frame"
    style="width:100%;height:calc(100vh - 56px - 52px);border:none;display:block"
    src=""
  ></iframe>

  <!-- Progress Tracker -->
  <div class="tracker-bar" id="tracker-bar">
    <div class="tracker-label">
      <span id="tracker-subject">Loading...</span>
      <span id="tracker-percent">0%</span>
    </div>
    <div class="tracker-track">
      <div class="tracker-fill" id="tracker-fill" style="width:0%"></div>
    </div>
  </div>

  <!-- Module Tracker Panel -->
  <div id="module-panel" style="display:none;position:fixed;bottom:52px;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;z-index:150;max-height:50vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:0.85rem;font-weight:700;color:var(--text)">Module Progress</div>
      <button onclick="togglePanel()" style="background:none;border:none;color:var(--text-3);cursor:pointer;font-size:0.8rem">Close</button>
    </div>
    <div id="module-list"></div>
  </div>

  <!-- Toggle Panel Button -->
  <button id="modules-btn" onclick="togglePanel()" style="position:fixed;bottom:60px;right:16px;background:var(--primary);color:#fff;border:none;border-radius:99px;padding:8px 16px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px var(--primary-glow);z-index:140">
    Modules
</button>

  <script src="js/api.js"></script>
  <script src="js/viewer.js"></script>
</body>
</html>
